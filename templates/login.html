<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HelpDesk Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #16213e; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { text-align: center; margin-bottom: 30px; color: #e94560; font-size: 1.5em; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #a8a8b3; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; font-size: 1em; }
        button { width: 100%; padding: 14px; margin-top: 20px; background: #e94560; color: white; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #c23152; }
        .erro { background: #e74c3c; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .info { background: #0f3460; color: #a8a8b3; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.9em; }
        .voltar { text-align: center; margin-top: 15px; }
        .voltar a { color: #a8a8b3; text-decoration: none; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Área Administrativa</h1>
        
        {% if erro %}
        <div class="erro">Usuário ou senha incorretos.</div>
        {% endif %}
        
        <div class="info">
            Demonstração: use <strong>recrutador</strong> / <strong>helpdesk2026</strong>
        </div>
        
        <form action="/login" method="POST">
            <label>Usuário</label>
            <input type="text" name="usuario" required>
            
            <label>Senha</label>
            <input type="password" name="senha" required>
            
            <button type="submit">Entrar</button>
        </form>
        
        <div class="voltar">
            <a href="/">Voltar ao site</a>
        </div>
    </div>
</body>
</html>
